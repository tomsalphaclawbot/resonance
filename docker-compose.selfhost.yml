name: resonance-selfhost

services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
      until nc -z postgres 5432; do echo 'waiting for postgres...'; sleep 1; done;
      npm ci;
      npx prisma migrate deploy;
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    ports:
      - "3000:3000"
    env_file:
      - .env.selfhost
    environment:
      DATABASE_URL: postgresql://resonance:resonance@postgres:5432/resonance
      APP_URL: ${APP_URL:-http://localhost:3000}
      SELFHOST_MODE: ${SELFHOST_MODE:-true}
      NEXT_PUBLIC_SELFHOST_MODE: ${NEXT_PUBLIC_SELFHOST_MODE:-true}
      DISABLE_AUTH: ${DISABLE_AUTH:-true}
      DISABLE_BILLING: ${DISABLE_BILLING:-true}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-selfhost-local}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-selfhost-local}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-selfhost-local}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-resonance-audio}
      CHATTERBOX_API_URL: ${CHATTERBOX_API_URL:-http://localhost:8000}
      CHATTERBOX_API_KEY: ${CHATTERBOX_API_KEY:-selfhost-local}
      SKIP_ENV_VALIDATION: ${SKIP_ENV_VALIDATION:-false}
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resonance
      POSTGRES_USER: resonance
      POSTGRES_PASSWORD: resonance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonance -d resonance"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  app_node_modules:

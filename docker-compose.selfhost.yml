version: "3.9"

name: resonance-selfhost

services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - .env.selfhost
    environment:
      # Current code expects Cloudflare-style endpoint construction from R2_ACCOUNT_ID.
      # During migration, prefer adding S3_ENDPOINT support and use minio service directly.
      DATABASE_URL: postgresql://resonance:resonance@postgres:5432/resonance
      R2_ACCOUNT_ID: minio-local
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      R2_BUCKET_NAME: resonance-audio
      CHATTERBOX_API_URL: ${CHATTERBOX_API_URL:-http://chatterbox:8000}
      CHATTERBOX_API_KEY: ${CHATTERBOX_API_KEY:-change-me}
      APP_URL: ${APP_URL:-http://localhost:3000}
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resonance
      POSTGRES_USER: resonance
      POSTGRES_PASSWORD: resonance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonance -d resonance"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # One-shot helper to create required bucket in MinIO
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/resonance-audio || true;
      mc anonymous set private local/resonance-audio || true;
      "
    restart: "no"

  # Optional local inference service placeholder (Phase 2)
  # chatterbox:
  #   image: ghcr.io/your-org/chatterbox-api:latest
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     CHATTERBOX_API_KEY: ${CHATTERBOX_API_KEY:-change-me}
  #   restart: unless-stopped

  # Optional auth provider placeholder (Phase 2)
  # keycloak:
  #   image: quay.io/keycloak/keycloak:26.0
  #   command: start-dev
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     KEYCLOAK_ADMIN: admin
  #     KEYCLOAK_ADMIN_PASSWORD: change-me

  # Optional billing/metering placeholder (Phase 2)
  # lago:
  #   image: getlago/lago-api:latest
  #   ports:
  #     - "3001:3000"

  # Optional observability placeholder (Phase 3)
  # sentry-selfhost:
  #   image: getsentry/sentry:latest
  #   ports:
  #     - "9002:9000"

volumes:
  postgres_data:
  minio_data:
  app_node_modules: